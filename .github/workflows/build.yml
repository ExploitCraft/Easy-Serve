name: Build EasyServe Windows Installer

on:
  push:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: EasyServe ${{ github.ref_name }}
          releaseBody: |
            ## EasyServe ${{ github.ref_name }}

            ### Install
            Download the `.exe` installer below and run it.
            Windows may show a SmartScreen warning — click **More info → Run anyway**.
          releaseDraft: true
          prerelease: false

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: EasyServe-Windows-Setup-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: EasyServe-Windows-Setup-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30
